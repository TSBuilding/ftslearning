<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FTS Learning HQ</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFD93D;
    --red: #E63946;
    --blue: #1D3557;
    --lightblue: #457B9D;
    --green: #2DC653;
    --white: #F8F9FA;
    --dark: #0D0D0D;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; overflow-x: hidden; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--blue);
    min-height: 100vh;
    position: relative;
  }

  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .bg-layer::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 28px 28px;
  }

  .bg-layer::after {
    content: '';
    position: absolute;
    inset: -100%;
    background: repeating-linear-gradient(
      55deg,
      transparent,
      transparent 40px,
      rgba(255,255,255,0.02) 40px,
      rgba(255,255,255,0.02) 80px
    );
    animation: slideBg 30s linear infinite;
  }

  @keyframes slideBg {
    from { transform: translateX(0); }
    to   { transform: translateX(200px); }
  }

  .floater {
    position: fixed;
    font-size: 2rem;
    opacity: 0.08;
    pointer-events: none;
    animation: floatUp linear infinite;
    z-index: 0;
  }

  @keyframes floatUp {
    0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.08; }
    90%  { opacity: 0.08; }
    100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
  }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    padding: 28px 20px 48px;
    max-width: 700px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
    animation: dropIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes dropIn {
    from { transform: translateY(-60px) scale(0.8); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }

  .shield {
    display: inline-block;
    font-size: 4rem;
    margin-bottom: 8px;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.06); }
  }

  .header h1 {
    font-family: 'Bangers', cursive;
    font
