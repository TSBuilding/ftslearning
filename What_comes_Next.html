<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>What Comes Next? ⚡</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFD93D;
    --red: #E63946;
    --blue: #1D3557;
    --green: #2DC653;
    --dark: #0D0D0D;
    --correct: #2DC653;
    --wrong: #E63946;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow-x: hidden; }
  body { font-family: 'Nunito', sans-serif; background: var(--blue); min-height: 100vh; position: relative; }

  .bg-layer { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
  .bg-layer::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 28px 28px; }
  .bg-layer::after { content: ''; position: absolute; inset: -100%; background: repeating-linear-gradient(55deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 80px); animation: slideBg 30s linear infinite; }
  @keyframes slideBg { from { transform: translateX(0); } to { transform: translateX(200px); } }

  .floater { position: fixed; font-size: 2rem; opacity: 0.07; pointer-events: none; animation: floatUp linear infinite; z-index: 0; }
  @keyframes floatUp { 0% { transform: translateY(110vh) rotate(0deg); opacity: 0; } 10% { opacity: 0.07; } 90% { opacity: 0.07; } 100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; } }

  .page { position: relative; z-index: 1; min-height: 100vh; padding: 20px 16px 40px; max-width: 660px; margin: 0 auto; }

  .btn-back { font-family: 'Bangers', cursive; font-size: 1rem; letter-spacing: 2px; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); border: 2px solid rgba(255,255,255,0.15); border-radius: 50px; padding: 8px 20px; cursor: pointer; transition: all 0.15s; text-decoration: none; margin-bottom: 14px; display: block; width: fit-content; }
  .btn-back:hover { background: rgba(255,255,255,0.14); color: white; }

  .header { text-align: center; margin-bottom: 14px; animation: dropIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
  @keyframes dropIn { from { transform: translateY(-60px) scale(0.8); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
  .header h1 { font-family: 'Bangers', cursive; font-size: clamp(2rem, 7vw, 3.2rem); color: var(--gold); letter-spacing: 3px; line-height: 1; text-shadow: 3px 3px 0 var(--red), 6px 6px 0 rgba(0,0,0,0.3); }
  .header p { color: rgba(255,255,255,0.65); font-weight: 700; font-size: 0.9rem; margin-top: 5px; letter-spacing: 1px; }

  .top-bar { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.07); border: 2px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 10px 16px; margin-bottom: 12px; }
  .score-label { font-family: 'Bangers', cursive; font-size: 1rem; color: rgba(255,255,255,0.5); letter-spacing: 2px; }
  .score-val { font-family: 'Bangers', cursive; font-size: 1.8rem; color: var(--gold); text-shadow: 2px 2px 0 rgba(0,0,0,0.3); }
  .progress-wrap { flex: 1; margin: 0 14px; }
  .progress-track { background: rgba(255,255,255,0.1); border-radius: 50px; height: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), #FF9F43); border-radius: 50px; transition: width 0.4s ease; box-shadow: 0 0 8px rgba(255,217,61,0.6); }
  .progress-text { font-size: 0.72rem; color: rgba(255,255,255,0.5); font-weight: 700; text-align: center; margin-top: 3px; letter-spacing: 1px; }

  .diff-badge { display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
  .diff-pill { font-family: 'Bangers', cursive; font-size: 0.85rem; letter-spacing: 2px; padding: 4px 14px; border-radius: 50px; border: 2px solid; transition: all 0.3s; }
  .diff-pill.easy   { background: rgba(45,198,83,0.15);  border-color: rgba(45,198,83,0.4);  color: #2DC653; }
  .diff-pill.medium { background: rgba(255,217,61,0.15); border-color: rgba(255,217,61,0.4); color: var(--gold); }
  .diff-pill.hard   { background: rgba(230,57,70,0.15);  border-color: rgba(230,57,70,0.4);  color: #E63946; }
  .diff-pill.expert { background: rgba(168,85,247,0.15); border-color: rgba(168,85,247,0.4); color: #A855F7; }

  .q-card { background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)); border: 2px solid rgba(255,255,255,0.12); border-radius: 24px; padding: 28px 20px 24px; text-align: center; margin-bottom: 16px; position: relative; overflow: hidden; animation: fadeUp 0.4s ease both; }
  .q-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at 60% 40%, rgba(255,217,61,0.04), transparent 60%); pointer-events: none; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

  .q-label { font-family: 'Bangers', cursive; font-size: 0.85rem; color: rgba(255,255,255,0.35); letter-spacing: 3px; margin-bottom: 10px; }

  .sequence { display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }

  .seq-num { min-width: 54px; height: 60px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-family: 'Bangers', cursive; font-size: 1.8rem; border: 2px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.07); color: white; text-shadow: 1px 2px 0 rgba(0,0,0,0.3); transition: all 0.3s; padding: 0 8px; }

  .seq-num.blank { border: 3px dashed var(--gold); background: rgba(255,217,61,0.08); color: var(--gold); font-size: 2rem; animation: blankPulse 2s ease-in-out infinite; min-width: 60px; }
  @keyframes blankPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,217,61,0.3); } 50% { box-shadow: 0 0 0 8px rgba(255,217,61,0); } }

  .seq-num.correct-reveal { border-color: var(--correct); background: rgba(45,198,83,0.2); color: var(--correct); animation: popBounce 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .seq-num.wrong-reveal   { border-color: var(--wrong);   background: rgba(230,57,70,0.2);  color: var(--wrong);   animation: shake 0.4s ease; }
  @keyframes popBounce { 0% { transform: scale(1); } 50% { transform: scale(1.25); } 100% { transform: scale(1); } }
  @keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-7px); } 40% { transform: translateX(7px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(4px); } }

  .seq-arrow { font-family: 'Bangers', cursive; font-size: 1.2rem; color: rgba(255,255,255,0.25); }
  .rule-hint { font-size: 0.78rem; font-weight: 800; color: rgba(255,255,255,0.35); letter-spacing: 1px; margin-top: 10px; text-transform: uppercase; min-height: 18px; }

  .choices { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 14px; }
  .choice-btn { font-family: 'Bangers', cursive; font-size: 2rem; color: white; background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06)); border: 2px solid rgba(255,255,255,0.2); border-radius: 16px; padding: 18px 8px; cursor: pointer; letter-spacing: 1px; text-shadow: 1px 2px 0 rgba(0,0,0,0.3); transition: transform 0.12s, box-shadow 0.12s; box-shadow: 0 5px 0 rgba(0,0,0,0.25); -webkit-user-select: none; user-select: none; }
  .choice-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 0 rgba(0,0,0,0.25); background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.1)); }
  .choice-btn:active:not(:disabled) { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.25); }
  .choice-btn:disabled { cursor: default; }
  .choice-btn.correct { background: linear-gradient(135deg, #2DC653, #1a8a35); border-color: #2DC653; box-shadow: 0 5px 0 #0f5c22; transform: translateY(-3px); }
  .choice-btn.wrong   { background: linear-gradient(135deg, #E63946, #a01f2a); border-color: #E63946; box-shadow: 0 5px 0 #6b1017; }
  .choice-btn.dimmed  { opacity: 0.3; }

  .feedback { font-family: 'Bangers', cursive; font-size: 1.2rem; letter-spacing: 1px; min-height: 30px; text-align: center; margin-bottom: 10px; }
  .feedback.correct { color: var(--correct); text-shadow: 0 0 20px rgba(45,198,83,0.5); }
  .feedback.wrong   { color: var(--wrong);   text-shadow: 0 0 20px rgba(230,57,70,0.5); }
  .feedback.empty   { color: transparent; }

  .btn-next { font-family: 'Bangers', cursive; font-size: 1.3rem; letter-spacing: 2px; background: linear-gradient(135deg, var(--gold), #FF9F43); color: var(--dark); border: none; border-radius: 50px; padding: 13px 40px; cursor: pointer; box-shadow: 0 6px 0 #b8960a; transition: transform 0.12s, box-shadow 0.12s; display: none; margin: 0 auto; }
  .btn-next.show { display: block; animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .btn-next:hover { transform: translateY(-3px); box-shadow: 0 9px 0 #b8960a; }
  .btn-next:active { transform: translateY(3px); box-shadow: 0 3px 0 #b8960a; }

  .results { display: none; text-align: center; }
  .results.show { display: block; animation: fadeUp 0.5s ease both; }
  .results-trophy { font-size: 5rem; display: block; margin-bottom: 10px; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .results-title { font-family: 'Bangers', cursive; font-size: clamp(2rem, 8vw, 3.5rem); color: var(--gold); letter-spacing: 3px; text-shadow: 3px 3px 0 var(--red); margin-bottom: 6px; }
  .results-score { font-family: 'Bangers', cursive; font-size: 1.5rem; color: white; letter-spacing: 1px; margin-bottom: 16px; }
  .results-stars { font-size: 2.2rem; letter-spacing: 5px; margin-bottom: 20px; display: block; }

  .btn-new { font-family: 'Bangers', cursive; font-size: 1.3rem; letter-spacing: 2px; background: linear-gradient(135deg, #E63946, #c1121f); color: white; border: none; border-radius: 50px; padding: 13px 40px; cursor: pointer; box-shadow: 0 6px 0 #7d0d14; transition: transform 0.12s; margin-bottom: 12px; display: block; width: 100%; }
  .btn-new:hover { transform: translateY(-3px); }
  .btn-new:active { transform: translateY(3px); }

  .btn-home { font-family: 'Bangers', cursive; font-size: 1.1rem; letter-spacing: 2px; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); border: 2px solid rgba(255,255,255,0.15); border-radius: 50px; padding: 11px 32px; cursor: pointer; transition: all 0.15s; display: block; width: 100%; text-decoration: none; text-align: center; }
  .btn-home:hover { background: rgba(255,255,255,0.14); color: white; }

  .confetti-piece { position: fixed; top: -20px; border-radius: 2px; animation: confettiFall linear forwards; pointer-events: none; z-index: 999; }
  @keyframes confettiFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 80% { opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

  .splash { position: fixed; inset: 0; background: var(--blue); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; animation: splashOut 0.5s ease 1.6s both; }
  @keyframes splashOut { to { opacity: 0; pointer-events: none; } }
  .splash-icon { font-size: 5rem; animation: splashBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both; }
  .splash-title { font-family: 'Bangers', cursive; font-size: 3rem; color: var(--gold); letter-spacing: 4px; text-shadow: 3px 3px 0 var(--red); animation: splashBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s both; }
  @keyframes splashBounce { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>

<div class="splash">
  <div class="splash-icon">🔢</div>
  <div class="splash-title">WHAT COMES NEXT?</div>
</div>

<div class="bg-layer"></div>
<div class="floater" style="left:5%;  animation-duration:16s; animation-delay:0s;">🔢</div>
<div class="floater" style="left:22%; animation-duration:22s; animation-delay:3s;">⭐</div>
<div class="floater" style="left:45%; animation-duration:18s; animation-delay:6s;">⚡</div>
<div class="floater" style="left:68%; animation-duration:20s; animation-delay:1s;">🧠</div>
<div class="floater" style="left:88%; animation-duration:14s; animation-delay:4s;">🏆</div>

<div class="page">

  <a class="btn-back" href="index.html">🏠 Back to HQ</a>

  <div class="header">
    <h1>🔢 WHAT COMES NEXT? 🔢</h1>
    <p>Work out the pattern — tap the missing number!</p>
  </div>

  <div class="top-bar">
    <div><div class="score-label">SCORE</div><div class="score-val" id="scoreVal">0</div></div>
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-text" id="progressText">0 / 10</div>
    </div>
    <div><div class="score-label">BEST</div><div class="score-val" id="bestVal">0</div></div>
  </div>

  <div id="gameArea">

    <div class="diff-badge">
      <div class="diff-pill easy" id="diffPill">EASY</div>
    </div>

    <div class="q-card" id="qCard">
      <div class="q-label" id="qLabel">QUESTION 1 OF 10 — WHAT COMES NEXT?</div>
      <div class="sequence" id="seqRow"></div>
      <div class="rule-hint" id="ruleHint"></div>
    </div>

    <div class="choices" id="choicesGrid"></div>
    <div class="feedback empty" id="feedback">-</div>
    <button class="btn-next" id="btnNext" onclick="nextQuestion()">NEXT ➜</button>

  </div>

  <div class="results" id="resultsScreen">
    <span class="results-trophy" id="resultsTrophy">🏆</span>
    <div class="results-title" id="resultsTitle">AMAZING!</div>
    <div class="results-score" id="resultsScore">10 out of 10</div>
    <span class="results-stars" id="resultsStars">⭐⭐⭐⭐⭐</span>
    <button class="btn-new" onclick="startGame()">🔄 PLAY AGAIN!</button>
    <a class="btn-home" href="index.html">🏠 Back to HQ</a>
  </div>

</div>

<script>
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function randItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(a) { return [...a].sort(() => Math.random() - 0.5); }

function makeQuestion(qIndex) {
  const diff = qIndex <= 2 ? 'easy' : qIndex <= 5 ? 'medium' : qIndex <= 7 ? 'hard' : 'expert';
  let seq, answer, rule;

  if (diff === 'easy') {
    const type = randItem([
      { step:1,  start: randInt(1,10) },
      { step:2,  start: randInt(1,5)*2 },
      { step:5,  start: randItem([5,10,15,20]) },
      { step:10, start: randItem([10,20,30,40]) },
    ]);
    const s = type.start, d = type.step;
    seq = [s, s+d, s+d*2, s+d*3, null];
    answer = s + d*4;
    rule = d === 1 ? 'Count by 1s' : `Count by ${d}s`;

  } else if (diff === 'medium') {
    const type = randInt(0,3);
    if (type === 0) {
      const s = randItem([3,6,9,12]);
      seq = [s, s+3, s+6, s+9, null]; answer = s+12; rule = 'Count by 3s';
    } else if (type === 1) {
      const s = randItem([4,8,12,16]);
      seq = [s, s+4, s+8, s+12, null]; answer = s+16; rule = 'Count by 4s';
    } else if (type === 2) {
      const s = randItem([20,24,28,30]);
      seq = [s, s-2, s-4, s-6, null]; answer = s-8; rule = 'Count backwards by 2s';
    } else {
      const d = randItem([2,5,10]), s = randInt(1,8)*d;
      const f = [s, s+d, s+d*2, s+d*3, s+d*4];
      seq = [f[0], f[1], null, f[3], f[4]]; answer = f[2]; rule = `Count by ${d}s`;
    }

  } else if (diff === 'hard') {
    const type = randInt(0,3);
    if (type === 0) {
      const s = randItem([1,2,3,4,5]);
      seq = [s, s*2, s*4, s*8, null]; answer = s*16; rule = 'Double each time';
    } else if (type === 1) {
      const d = randItem([6,7,8,9]), s = d;
      seq = [s, s+d, s+d*2, s+d*3, null]; answer = s+d*4; rule = `Count by ${d}s`;
    } else if (type === 2) {
      const d = randItem([3,5]), s = randItem([30,35,40,45,50]);
      seq = [s, s-d, s-d*2, s-d*3, null]; answer = s-d*4; rule = `Count backwards by ${d}s`;
    } else {
      const d = randItem([3,4,6]), s = randInt(1,5)*d;
      const f = [s, s+d, s+d*2, s+d*3, s+d*4];
      seq = [f[0], null, f[2], f[3], f[4]]; answer = f[1]; rule = `Count by ${d}s`;
    }

  } else {
    const type = randInt(0,3);
    if (type === 0) {
      const s = randInt(1,5);
      const f = [s, s+1, s+3, s+6, s+10];
      seq = [...f.slice(0,4), null]; answer = f[4]; rule = 'Adding one more each time';
    } else if (type === 1) {
      const s = randItem([1,2,3]);
      seq = [s, s*3, s*9, s*27, null]; answer = s*81; rule = 'Triple each time';
    } else if (type === 2) {
      const isOdd = randInt(0,1);
      const s = isOdd ? randItem([1,3,5,7,9]) : randItem([2,4,6,8,10]);
      seq = [s, s+2, s+4, s+6, null]; answer = s+8; rule = isOdd ? 'Odd numbers' : 'Even numbers';
    } else {
      const d = randItem([7,8,9,11]), s = d;
      const f = [s, s+d, s+d*2, s+d*3, s+d*4];
      seq = [f[0], f[1], null, f[3], f[4]]; answer = f[2]; rule = `Count by ${d}s`;
    }
  }

  return { seq, answer, rule, diff };
}

function generateWrongAnswers(correct, seq) {
  const wrongs = new Set();
  [correct-1, correct+1, correct-2, correct+2, correct+3, correct-3].forEach(n => { if(n>0 && n!==correct) wrongs.add(n); });
  const nums = seq.filter(n => n !== null);
  if (nums.length > 0) {
    const last = nums[nums.length-1];
    [last+1, last-1, last*2, correct*2].forEach(n => { if(n>0 && n!==correct) wrongs.add(n); });
  }
  const pool = shuffle([...wrongs].filter(n => n>0 && n!==correct));
  const result = [];
  for (let i=0; i<pool.length && result.length<3; i++) {
    if (!result.includes(pool[i])) result.push(pool[i]);
  }
  while (result.length < 3) {
    const r = correct + (result.length+1)*3;
    if (!result.includes(r) && r!==correct) result.push(r);
  }
  return result.slice(0,3);
}

const TOTAL = 10;
let current=0, score=0, answered=false, questions=[];
let best = parseInt(localStorage.getItem('seqBest') || '0');

function generateQuestions() {
  questions = [];
  const bands = [shuffle([0,1,2]), shuffle([3,4,5]), shuffle([6,7]), shuffle([8,9])];
  bands.flat().forEach(i => questions.push(makeQuestion(i)));
}

function updateStreak() {
  const today=new Date().toDateString(), last=localStorage.getItem('lastVisit');
  let streak=parseInt(localStorage.getItem('streak')||'0');
  if(last===today){}
  else if(last===new Date(Date.now()-86400000).toDateString()){streak++;localStorage.setItem('streak',streak);localStorage.setItem('lastVisit',today);}
  else{streak=1;localStorage.setItem('streak',streak);localStorage.setItem('lastVisit',today);}
}

function startGame() {
  generateQuestions();
  current=0; score=0; answered=false;
  document.getElementById('resultsScreen').classList.remove('show');
  document.getElementById('gameArea').style.display='block';
  document.getElementById('scoreVal').textContent='0';
  document.getElementById('bestVal').textContent=best;
  renderQuestion();
}

function renderQuestion() {
  answered=false;
  const q=questions[current];
  document.getElementById('progressFill').style.width=(current/TOTAL*100)+'%';
  document.getElementById('progressText').textContent=current+' / '+TOTAL;
  document.getElementById('qLabel').textContent='QUESTION '+(current+1)+' OF '+TOTAL+' — WHAT COMES NEXT?';
  document.getElementById('ruleHint').textContent='';

  const pill=document.getElementById('diffPill');
  const labels={easy:'⭐ EASY',medium:'⭐⭐ MEDIUM',hard:'⭐⭐⭐ HARD',expert:'🔥 EXPERT'};
  pill.textContent=labels[q.diff]; pill.className='diff-pill '+q.diff;

  const row=document.getElementById('seqRow');
  row.innerHTML='';
  q.seq.forEach((n,i)=>{
    if(i>0){const a=document.createElement('div');a.className='seq-arrow';a.textContent='→';row.appendChild(a);}
    const box=document.createElement('div');
    box.className='seq-num'+(n===null?' blank':'');
    box.id='seqBox'+i;
    box.textContent=n===null?'?':n;
    row.appendChild(box);
  });

  const choices=shuffle([q.answer,...generateWrongAnswers(q.answer,q.seq)]);
  const grid=document.getElementById('choicesGrid');
  grid.innerHTML='';
  choices.forEach(val=>{
    const btn=document.createElement('button');
    btn.className='choice-btn'; btn.textContent=val;
    btn.onclick=()=>handleChoice(btn,val,q.answer,q);
    grid.appendChild(btn);
  });

  const fb=document.getElementById('feedback');
  fb.className='feedback empty'; fb.textContent='-';
  document.getElementById('btnNext').classList.remove('show');
}

function handleChoice(btn,chosen,correct,q) {
  if(answered)return;
  answered=true;
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  const fb=document.getElementById('feedback');
  const blankIdx=q.seq.indexOf(null);
  const blankBox=document.getElementById('seqBox'+blankIdx);

  if(chosen===correct){
    score++;
    document.getElementById('scoreVal').textContent=score;
    btn.classList.add('correct');
    if(blankBox){blankBox.textContent=correct;blankBox.classList.remove('blank');blankBox.classList.add('correct-reveal');}
    fb.className='feedback correct';
    fb.textContent=randItem(['SUPERSTAR!','NAILED IT!','BRILLIANT!','PATTERN PRO!','ON FIRE!','GENIUS!']);
    document.getElementById('ruleHint').textContent='✔ '+q.rule;
    if(score>best){best=score;localStorage.setItem('seqBest',best);document.getElementById('bestVal').textContent=best;}
  } else {
    btn.classList.add('wrong');
    if(blankBox){blankBox.textContent=chosen;blankBox.classList.remove('blank');blankBox.classList.add('wrong-reveal');}
    fb.className='feedback wrong';
    fb.textContent=randItem(['SO CLOSE!','NEARLY!','KEEP THINKING!','GOOD TRY!']);
    document.getElementById('ruleHint').textContent=q.rule+' — the answer was '+correct;
    document.querySelectorAll('.choice-btn').forEach(b=>{
      if(parseInt(b.textContent)===correct)b.classList.add('correct');
      else if(b!==btn)b.classList.add('dimmed');
    });
  }

  setTimeout(()=>{
    if(current<TOTAL-1) document.getElementById('btnNext').classList.add('show');
    else setTimeout(showResults,900);
  },700);
}

function nextQuestion(){current++;renderQuestion();window.scrollTo({top:0,behavior:'smooth'});}

function showResults(){
  updateStreak();
  document.getElementById('gameArea').style.display='none';
  document.getElementById('progressFill').style.width='100%';
  document.getElementById('progressText').textContent=TOTAL+' / '+TOTAL;
  document.getElementById('resultsScreen').classList.add('show');

  let trophy,title;
  if(score===TOTAL)    {trophy='🏆';title='PERFECT!';   launchConfetti(80);}
  else if(score>=8)    {trophy='🌟';title='AMAZING!';   launchConfetti(45);}
  else if(score>=6)    {trophy='👊';title='GREAT JOB!';}
  else if(score>=4)    {trophy='💪';title='KEEP GOING!';}
  else                 {trophy='🔄';title='TRY AGAIN!';}

  document.getElementById('resultsTrophy').textContent=trophy;
  document.getElementById('resultsTitle').textContent=title;
  document.getElementById('resultsScore').textContent=score+' out of '+TOTAL;
  const stars=Math.min(5,Math.round((score/TOTAL)*5));
  document.getElementById('resultsStars').textContent='⭐'.repeat(stars)+'⬜'.repeat(5-stars);
  document.getElementById('resultsScreen').scrollIntoView({behavior:'smooth',block:'center'});
}

function launchConfetti(count){
  const colors=['#FFD93D','#2DC653','#6EC6F5','#E63946','#9C27B0','#FF9F43'];
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      const p=document.createElement('div');
      p.className='confetti-piece';
      p.style.left=Math.random()*100+'vw';
      p.style.background=colors[Math.floor(Math.random()*colors.length)];
      p.style.width=(8+Math.random()*8)+'px';
      p.style.height=(8+Math.random()*8)+'px';
      p.style.borderRadius=Math.random()>0.5?'50%':'2px';
      p.style.animationDuration=(2+Math.random()*2)+'s';
      p.style.animationDelay=(Math.random()*0.3)+'s';
      document.body.appendChild(p);
      setTimeout(()=>p.remove(),5000);
    },i*20);
  }
}

document.getElementById('bestVal').textContent=best;
startGame();
</script>
