<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>World Landmarks — FTS Learning HQ</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1729;
    --card: #1e2d4a;
    --card2: #243459;
    --navy: #1a2744;
    --gold: #f59e0b;
    --text: #f0f4ff;
    --muted: #94a3b8;
    --green: #16a34a;
    --red: #dc2626;
    --blue: #2563eb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; }
  body {
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    min-height: 100%;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 20% 20%, rgba(37,99,235,0.08) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 80%, rgba(245,158,11,0.06) 0%, transparent 55%);
    pointer-events: none; z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; max-width: 600px; margin: 0 auto; padding: 16px 16px 48px; display: flex; flex-direction: column; gap: 16px; }

  /* HEADER */
  .header { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; }
  .back-btn { background: var(--card); border: none; color: var(--muted); font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; padding: 8px 16px; border-radius: 20px; cursor: pointer; text-decoration: none; transition: all 0.2s; }
  .back-btn:hover { background: var(--card2); color: var(--text); }
  .title-block { text-align: center; flex: 1; }
  .title-block h1 { font-family: 'Fredoka One', cursive; font-size: 26px; color: var(--gold); letter-spacing: 1px; line-height: 1; }
  .title-block p { font-size: 11px; color: var(--muted); font-weight: 700; margin-top: 2px; }
  .spacer { width: 70px; }

  /* START SCREEN */
  #start-screen { display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .start-card { width: 100%; background: var(--card); border-radius: 24px; padding: 36px 24px; display: flex; flex-direction: column; align-items: center; gap: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.06); text-align: center; }
  .start-globe { font-size: 72px; animation: bob 2.5s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .start-title { font-family: 'Fredoka One', cursive; font-size: 26px; color: var(--text); line-height: 1.3; }
  .start-title span { color: var(--gold); }
  .start-sub { font-size: 15px; color: var(--muted); font-weight: 600; line-height: 1.5; }
  .start-btn { width: 100%; background: linear-gradient(135deg, var(--gold), #d97706); border: none; color: #1a1000; font-family: 'Fredoka One', cursive; font-size: 22px; padding: 18px; border-radius: 16px; cursor: pointer; box-shadow: 0 4px 20px rgba(245,158,11,0.35); transition: all 0.2s; }
  .start-btn:hover { transform: scale(1.02); }

  /* GAME SCREEN */
  #game-screen { display: none; flex-direction: column; gap: 14px; }
  #game-screen.active { display: flex; }

  /* Progress */
  .progress-wrap { width: 100%; background: var(--card); border-radius: 20px; height: 10px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--gold), #3b82f6); border-radius: 20px; transition: width 0.5s ease; }
  .progress-row { display: flex; align-items: center; justify-content: space-between; }
  .progress-label { font-size: 12px; color: var(--muted); font-weight: 700; }
  .score-dots { display: flex; gap: 6px; }
  .score-dot { width: 22px; height: 22px; border-radius: 50%; background: var(--card2); border: 2px solid rgba(255,255,255,0.1); font-size: 11px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
  .score-dot.pass { background: var(--green); border-color: var(--green); }
  .score-dot.fail { background: var(--red); border-color: var(--red); }

  /* Illustration card */
  .landmark-card { width: 100%; background: var(--card); border-radius: 24px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.06); }
  .landmark-illustration { width: 100%; display: flex; align-items: center; justify-content: center; padding: 8px; background: linear-gradient(180deg, #1a3a6b 0%, #0d2040 100%); }
  .landmark-illustration svg { width: 100%; max-width: 340px; height: auto; border-radius: 16px; }
  .landmark-info { padding: 16px 20px 20px; }
  .landmark-country { font-size: 11px; font-weight: 800; color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
  .landmark-clue { font-size: 15px; font-weight: 700; color: var(--muted); line-height: 1.5; }
  .landmark-clue span { color: var(--text); }

  /* Choices */
  .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .choice-btn { background: var(--card); border: 2px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 14px 12px; font-family: 'Fredoka One', cursive; font-size: 16px; color: var(--text); cursor: pointer; transition: all 0.2s; text-align: center; line-height: 1.2; }
  .choice-btn:hover:not(:disabled) { background: var(--card2); border-color: var(--gold); transform: scale(1.02); }
  .choice-btn:active:not(:disabled) { transform: scale(0.97); }
  .choice-btn.correct { background: rgba(22,163,74,0.2); border-color: var(--green); color: #4ade80; }
  .choice-btn.wrong { background: rgba(220,38,38,0.15); border-color: var(--red); color: #f87171; }
  .choice-btn.reveal { background: rgba(22,163,74,0.12); border-color: var(--green); color: #4ade80; }
  .choice-btn:disabled { cursor: default; }

  /* Feedback */
  .feedback-bar { width: 100%; background: var(--card); border-radius: 16px; padding: 16px 20px; display: none; align-items: center; justify-content: space-between; gap: 12px; border: 2px solid transparent; animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes popIn { from{transform:scale(0.85);opacity:0} to{transform:scale(1);opacity:1} }
  .feedback-bar.correct { display: flex; border-color: var(--green); background: rgba(22,163,74,0.1); }
  .feedback-bar.wrong { display: flex; border-color: var(--red); background: rgba(220,38,38,0.08); }
  .feedback-left { display: flex; align-items: center; gap: 10px; }
  .feedback-emoji { font-size: 28px; }
  .feedback-msg { font-size: 16px; font-weight: 800; }
  .feedback-bar.correct .feedback-msg { color: #4ade80; }
  .feedback-bar.wrong .feedback-msg { color: #f87171; }
  .next-btn { background: var(--card2); border: 2px solid rgba(255,255,255,0.1); color: var(--text); font-family: 'Fredoka One', cursive; font-size: 15px; padding: 10px 18px; border-radius: 12px; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
  .next-btn:hover { background: #2d3f60; }

  /* RESULTS */
  #results-screen { display: none; flex-direction: column; align-items: center; gap: 16px; }
  #results-screen.active { display: flex; }
  .results-card { width: 100%; background: var(--card); border-radius: 24px; padding: 36px 24px; display: flex; flex-direction: column; align-items: center; gap: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); text-align: center; }
  .results-trophy { font-size: 72px; animation: bob 2s ease-in-out infinite; }
  .results-title { font-family: 'Fredoka One', cursive; font-size: 30px; color: var(--gold); }
  .results-score { font-family: 'Fredoka One', cursive; font-size: 56px; color: white; line-height: 1; }
  .results-score span { font-size: 26px; color: var(--muted); }
  .results-msg { font-size: 15px; color: var(--muted); font-weight: 700; line-height: 1.5; }
  .missed-panel { width: 100%; background: rgba(220,38,38,0.08); border: 1px solid rgba(220,38,38,0.25); border-radius: 16px; padding: 14px 16px; display: flex; flex-direction: column; gap: 6px; }
  .missed-panel h3 { font-size: 11px; font-weight: 900; color: #f87171; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
  .missed-item { font-size: 14px; font-weight: 700; color: var(--text); }
  .missed-item em { color: var(--muted); font-style: normal; font-size: 12px; }
  .play-again-btn { width: 100%; background: linear-gradient(135deg, var(--gold), #d97706); border: none; color: #1a1000; font-family: 'Fredoka One', cursive; font-size: 22px; padding: 18px; border-radius: 16px; cursor: pointer; box-shadow: 0 4px 20px rgba(245,158,11,0.35); transition: all 0.2s; }
  .play-again-btn:hover { transform: scale(1.02); }

  /* Confetti */
  .confetti-piece { position: fixed; pointer-events: none; z-index: 999; border-radius: 2px; animation: cfall linear forwards; }
  @keyframes cfall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
</style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <a href="index.html" class="back-btn">← Home</a>
    <div class="title-block">
      <h1>🌍 World Landmarks</h1>
      <p>FTS Learning HQ</p>
    </div>
    <div class="spacer"></div>
  </div>

  <!-- START -->
  <div id="start-screen">

      <div class="start-globe">🌍</div>

      <button class="start-btn" id="start-btn">🗺️ Start Exploring!</button>
    </div>
  </div>

  <!-- GAME -->
  <div id="game-screen">
    <div class="progress-row">

        <div class="landmark-country" id="landmark-country"></div>
        <div class="landmark-clue" id="landmark-clue"></div>
      </div>
    </div>

    <div class="choices-grid" id="choices-grid"></div>

    <div class="feedback-bar" id="feedback-bar">
      <div class="feedback-left">
        <div class="feedback-emoji" id="feedback-emoji"></div>
        <div class="feedback-msg" id="feedback-msg"></div>
      </div>
      <button class="next-btn" id="next-btn">Next →</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results-screen">
    <div class="results-card">
      <div class="results-trophy" id="results-trophy">🏆</div>
      <div class="results-title" id="results-title">Amazing, FTS!</div>

      <div class="results-msg" id="results-msg"></div>
      <div class="missed-panel" id="missed-panel" style="display:none">
        <h3>🗺️ Worth revisiting</h3>
        <div id="missed-list"></div>
      </div>
    </div>
    <button class="play-again-btn" id="play-again-btn">🌍 Play Again!</button>
  </div>

</div>

// ── GAME STATE ─────────────────────────────────────────────────────────
let queue = [];
let currentIdx = 0;
let score = 0;
let results = [];
let answered = false;

// ── SHUFFLE ────────────────────────────────────────────────────────────
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

// ── BUILD SESSION ──────────────────────────────────────────────────────
function buildSession() {
  queue = shuffle(LANDMARKS);
  currentIdx = 0;
  score = 0;
  results = [];
  answered = false;
  buildDots();
}

function buildDots() {
  const strip = document.getElementById('score-dots');
  strip.innerHTML = '';
  queue.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'score-dot';
    d.id = `dot-${i}`;
    strip.appendChild(d);
  });
}

// ── LOAD QUESTION ──────────────────────────────────────────────────────
function loadQuestion(idx) {
  answered = false;
  const lm = queue[idx];
  const total = queue.length;

  document.getElementById('progress-bar').style.width = `${(idx / total) * 100}%`;
  document.getElementById('progress-label').textContent = `${idx + 1} of ${total}`;

  document.getElementById('landmark-svg').innerHTML = lm.svg;
  document.getElementById('landmark-country').textContent = lm.country;
  document.getElementById('landmark-clue').innerHTML = lm.clue;

  // Hide feedback
  const fb = document.getElementById('feedback-bar');
  fb.className = 'feedback-bar';

  // Build choices: correct + 3 random others
  const others = LANDMARKS.filter(l => l.name !== lm.name);
  const wrong = shuffle(others).slice(0, 3);
  const choices = shuffle([lm, ...wrong]);

  const grid = document.getElementById('choices-grid');
  grid.innerHTML = '';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.name;
    btn.dataset.name = c.name;
    btn.addEventListener('click', () => handleAnswer(btn, c.name === lm.name, lm.name));
    grid.appendChild(btn);
  });
}

// ── HANDLE ANSWER ──────────────────────────────────────────────────────
function handleAnswer(btn, correct, correctName) {
  if (answered) return;
  answered = true;

  // Disable all buttons
  document.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    if (b.dataset.name === correctName) b.classList.add(correct && b === btn ? 'correct' : 'reveal');
  });
  if (!correct) btn.classList.remove('reveal');
  if (!correct) btn.classList.add('wrong');

  const dot = document.getElementById(`dot-${currentIdx}`);

  const fb = document.getElementById('feedback-bar');
  const emoji = document.getElementById('feedback-emoji');
  const msg = document.getElementById('feedback-msg');

  if (correct) {
    score++;
    dot?.classList.add('pass');
    dot && (dot.textContent = '✓');
    btn.classList.add('correct');
    fb.className = 'feedback-bar correct';
    emoji.textContent = ['🌟','🎉','⭐','🏆','✨'][Math.floor(Math.random()*5)];
    msg.textContent = ['Brilliant!','You got it!','Amazing!','Nailed it!','Perfect!'][Math.floor(Math.random()*5)];
    confetti();
  } else {
    dot?.classList.add('fail');
    dot && (dot.textContent = '✗');
    fb.className = 'feedback-bar wrong';
    emoji.textContent = '😅';
    msg.textContent = `It was the ${correctName}!`;
  }

  results.push({ name: queue[currentIdx].name, country: queue[currentIdx].country, correct });
}

// ── NEXT ───────────────────────────────────────────────────────────────
document.getElementById('next-btn').addEventListener('click', () => {
  currentIdx++;
  if (currentIdx >= queue.length) showResults();
  else loadQuestion(currentIdx);
});

// ── RESULTS ────────────────────────────────────────────────────────────
function showResults() {
  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('game-screen').classList.remove('active');
  const rs = document.getElementById('results-screen');
  rs.classList.add('active');

  const total = queue.length;
  const pct = score / total;
  document.getElementById('results-score').innerHTML = `${score} <span>/ ${total}</span>`;

  let title, msg, trophy;
  if (pct === 1)       { title = 'Perfect Explorer! 🌟'; msg = 'You knew every single landmark!'; trophy = '🏆'; confetti(); setTimeout(confetti, 500); }
  else if (pct >= 0.8) { title = 'World Traveller, FTS!'; msg = 'You really know your landmarks!'; trophy = '✈️'; }
  else if (pct >= 0.6) { title = 'Good exploring, FTS!'; msg = 'Keep travelling the world!'; trophy = '🌍'; }
  else                 { title = 'Keep exploring, FTS!'; msg = 'The world has so much to discover!'; trophy = '🗺️'; }

  document.getElementById('results-trophy').textContent = trophy;
  document.getElementById('results-title').textContent = title;
  document.getElementById('results-msg').textContent = msg;

  const missed = results.filter(r => !r.correct);
  const panel = document.getElementById('missed-panel');
  const list = document.getElementById('missed-list');
  list.innerHTML = '';
  if (missed.length > 0) {
    panel.style.display = 'flex';
    missed.forEach(r => {
      const div = document.createElement('div');
      div.className = 'missed-item';
      div.innerHTML = `${r.name} <em>— ${r.country}</em>`;
      list.appendChild(div);
    });
  } else {
    panel.style.display = 'none';
  }
}

// ── CONFETTI ───────────────────────────────────────────────────────────
function confetti() {
  const colors = ['#f59e0b','#3b82f6','#16a34a','#ec4899','#8b5cf6','#ef4444','#06b6d4'];
  for (let i = 0; i < 36; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.cssText = `left:${Math.random()*100}vw;top:-10px;width:${8+Math.random()*8}px;height:${8+Math.random()*8}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;transform:rotate(${Math.random()*360}deg)`;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 4000);
    }, i * 45);
  }
}

// ── SCREENS ────────────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', () => {
  buildSession();
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-screen').classList.add('active');
  loadQuestion(0);
});

document.getElementById('play-again-btn').addEventListener('click', () => {
  document.getElementById('results-screen').classList.remove('active');
  buildSession();
  document.getElementById('game-screen').classList.add('active');
  loadQuestion(0);
});
